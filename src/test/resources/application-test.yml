spring:
  datasource:
    url: jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1
    username: sa
    password: ""
    driver-class-name: org.h2.Driver
  jpa:
    hibernate:
      ddl-auto: create-drop
    database-platform: org.hibernate.dialect.H2Dialect
  task:
    scheduling:
      enabled: false
  kafka:
    bootstrap-servers: localhost:9092
    consumer:
      group-id: test-group
    listener:
      auto-startup: false
eureka:
  client:
    enabled: false
logging:
  level:
    root: WARN