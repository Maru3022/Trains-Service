global:
  scrape_interval: 15s

scrape_configs:
  - job_name: 'api-gateway'
    metrics_path: '/actuator/prometheus'
    static_configs:
      - targets: ['api-gateway:8075']

  - job_name: 'trains-service'
    metrics_path: '/actuator/prometheus'
    static_configs:
      - targets: ['trains-app:8035']